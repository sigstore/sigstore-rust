name: TUF Conformance

on:
  push:
    branches:
      - main
  pull_request:
  workflow_dispatch:
  schedule:
    - cron: "15 5 * * 2"
env:
  CARGO_TERM_COLOR: always

permissions: {}

jobs:
  conformance:
    name: TUF client conformance
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install

      - name: Build the conformance client adapter
        run: cargo build --release -p sigstore-tuf --example conformance_client

      # place the curated "expected to fail" list next to the built binary
      - name: Stage xfails next to the entrypoint
        run: cp crates/sigstore-tuf/conformance.xfails target/release/examples/conformance_client.xfails

      - name: Run TUF conformance suite
        uses: theupdateframework/tuf-conformance@500c525c9ce287a472fd334fe8d885cace667d32 # v2.4.0
        with:
          entrypoint: target/release/examples/conformance_client
