# Keeps the TUF data embedded in the sigstore-trust-root crate (TUF root.json
# metadata plus the trusted_root.json / signing config targets for the
# production, staging, and GitHub Sigstore instances) current.
#
# The update is performed with this repository's own TUF client:
#
#     cargo run -p sigstore-trust-root --example update-embedded-roots
#
# which fetches the data through the TUF protocol and writes the served bytes
# verbatim to the embedded file locations. When that produces a diff, this
# workflow opens (or updates) a pull request with the changes rather than just
# filing an issue, so the refreshed roots are ready to review and merge.

name: Update embedded TUF data

on:
  schedule:
    # Weekly, Wednesday 13:13 UTC
    - cron: "13 13 * * 3"
  workflow_dispatch:

permissions: {}

jobs:
  update-embedded-root:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install

      - name: Update embedded TUF data via the TUF client
        id: update
        # Don't fail the job if a single instance can't be refreshed: the
        # example still writes the instances that did update, and we want a PR
        # for those. A non-success outcome is surfaced in the PR body below.
        continue-on-error: true
        run: cargo run -p sigstore-trust-root --example update-embedded-roots

      - name: Open a pull request if the embedded data changed
        uses: peter-evans/create-pull-request@5f6978faf089d4d20b00c7766989d076bb2fc7f1 # v8.1.1
        with:
          base: main
          branch: automation/update-embedded-tuf-data
          delete-branch: true
          add-paths: crates/sigstore-trust-root/**
          commit-message: "trust-root: refresh embedded TUF data"
          signoff: true
          title: "trust-root: refresh embedded TUF data"
          labels: embedded-root-update
          body: |
            The Sigstore TUF repositories have changed: this refreshes the TUF
            data embedded in the `sigstore-trust-root` crate (root.json metadata
            and the trusted_root.json / signing config targets).

            Generated by running the crate's own TUF client:

            ```
            cargo run -p sigstore-trust-root --example update-embedded-roots
            ```

            The served bytes are written verbatim, so the diff reflects exactly
            what changed upstream. Please review before merging.

            Updater step outcome: `${{ steps.update.outcome }}` — if this is
            `failure`, at least one instance could not be refreshed; check the
            [workflow run](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }})
            logs to see which one and why.
