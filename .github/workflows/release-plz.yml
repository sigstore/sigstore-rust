name: Release-plz

on:
  push:
    branches:
      - main

permissions: {}

jobs:
  # Release unpublished packages.
  release-plz-release:
    name: Release-plz release
    runs-on: ubuntu-latest
    environment: crates-io
    # Prevent multiple releases from running at the same time
    concurrency:
      group: release-plz-release
      cancel-in-progress: false

    permissions:
      contents: write      # Required to create GitHub releases
      pull-requests: write # Required to update PRs
      id-token: write      # Required to request OIDC token for attestation generation

    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - uses: rust-lang/crates-io-auth-action@c6f97d42243bad5fab37ca0427f495c86d5b1a18 # v1.0.5
        id: auth

      - name: Install Rust toolchain
        run: rustup toolchain install

      - name: Run release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          CARGO_REGISTRY_TOKEN: ${{ steps.auth.outputs.token }}

  # Create a PR with the new versions and changelog, preparing the next release.
  release-plz-pr:
    name: Release-plz PR
    runs-on: ubuntu-latest
    concurrency:
      group: release-plz-pr
      cancel-in-progress: false
    permissions:
      contents: write      # Required to create GitHub releases
      pull-requests: write # Required to update PRs
    steps:
      - name: Checkout repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          fetch-depth: 0
          persist-credentials: false

      - name: Install Rust toolchain
        run: rustup toolchain install

      - name: Run release-plz
        id: release-plz
        uses: release-plz/action@e8792575c7f2366cf6ff3ccc33ead9ace5b691c7 # v0.5.130
        with:
          command: release-pr
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}

      # release-plz creates the commit via libgit2, so it cannot add a DCO
      # sign-off itself. Amend the commit it just pushed to append a
      # `Signed-off-by` trailer matching the commit author, then force-push.
      - name: Add DCO sign-off to release PR commit
        if: steps.release-plz.outputs.prs_created == 'true'
        env:
          GITHUB_TOKEN: ${{ secrets.RELEASE_PLZ_TOKEN }}
          PR: ${{ steps.release-plz.outputs.pr }}
        run: |
          head_branch="$(echo "$PR" | jq -r .head_branch)"
          git fetch origin "$head_branch"
          # Remember the commit release-plz just pushed so we can lease against
          # it below. --force-with-lease with no value relies on a remote-tracking
          # ref, which git can't resolve when pushing to an explicit URL rather
          # than the `origin` remote (it rejects with "stale info").
          base_sha="$(git rev-parse FETCH_HEAD)"
          git checkout -B "$head_branch" FETCH_HEAD
          name="$(git log -1 --format='%an')"
          email="$(git log -1 --format='%ae')"
          # --signoff is a no-op if an identical trailer is already present.
          git -c "user.name=$name" -c "user.email=$email" \
            commit --amend --signoff --no-edit
          git push --force-with-lease="$head_branch:$base_sha" \
            "https://x-access-token:${GITHUB_TOKEN}@github.com/${{ github.repository }}.git" \
            "HEAD:$head_branch"
